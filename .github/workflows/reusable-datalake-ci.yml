name: Reusable DataLake CI

on:
  workflow_call: {}

jobs:
  lint:
    name: Ruff (DataLake)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: DataLake
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install ruff
      - run: ruff check --select E9,F63,F7,F82,F401,F841 --exclude '*.ipynb' .

  test:
    name: Pytest (etl_pipeline)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: DataLake
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install pytest nltk dagster==1.5.9
      - run: python -m pytest etl_pipeline/etl_pipeline_tests/ -q

  compose-config:
    name: Validate docker-compose.yaml
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: DataLake
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - run: cp env.example .env && docker compose config -q
