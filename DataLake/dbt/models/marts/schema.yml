version: 2

models:
  - name: monthly_revenue
    description: Orders, revenue and freight aggregated per month.
    columns:
      - name: revenue
        tests:
          - not_null
  - name: revenue_by_category
    description: Orders and revenue per product category (English names).
    columns:
      - name: category
        tests:
          - not_null
          - unique
  - name: course_popularity
    description: Real interaction volume per course category (domain itlr).
    columns:
      - name: category
        tests:
          - not_null
          - unique
  - name: course_completion_funnel
    description: Interaction event counts by type (in_progress / completed / lesson_completed).
    columns:
      - name: event_type
        tests:
          - not_null
          - unique
