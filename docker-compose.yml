# ─────────────────────────────────────────────────────────────────────────────
# IT Learning — triển khai 3 dịch vụ: PostgreSQL + Recommender (Python) + Web (Express)
#
#   docker compose up -d --build        # khởi chạy
#   docker compose logs -f web          # xem log web (migrate/seed/server)
#   docker compose down                 # dừng (giữ dữ liệu)
#   docker compose down -v              # dừng + XÓA dữ liệu (pg + cache model)
#
# Biến môi trường lấy từ file .env cùng thư mục (xem .env.docker.example).
# YÊU CẦU: thư mục ./var/artifacts phải có model artifacts (chạy `python scripts/build_all.py`
# trước, hoặc copy artifacts vào) — recommender mount read-only từ đó.
# ─────────────────────────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-it_learning}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      # postgres:18 đổi quy ước: mount ở /var/lib/postgresql (data nằm trong subdir theo major version).
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-it_learning}"]
      interval: 5s
      timeout: 5s
      retries: 12
    # Mở cổng Postgres-Docker ra host ở 5433 (KHÔNG dùng 5432 để tránh đụng Postgres LOCAL).
    # -> web chạy local (npm run dev) trỏ DATABASE_URL tới localhost:5433 sẽ dùng ĐÚNG kho dữ liệu
    #    Docker (chứa tin nhắn/người dùng cũ).
    ports: ["5433:5432"]

  recommender:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Cho phép tải model HuggingFace ở lần chạy đầu (server tự setdefault =1).
      HF_HUB_OFFLINE: "0"
      TRANSFORMERS_OFFLINE: "0"
      # DỮ LIỆU THẬT: trỏ catalog + tương tác sang bộ 4.088 khóa IT thật (đồng bộ với web).
      # Engine vốn nạp item_list.pkl từ artifacts (đã build trên data thật); các biến này
      # giữ mọi code path đọc CSV cũng nhất quán dùng data thật.
      ITLR_ITEMS_CSV: /app/data/it_learning_items_real_vi.csv
      ITLR_INTERACTIONS_CSV: /app/data/interactions_real.csv
      EMBEDDING_MODEL: minilm           # artifacts build bằng minilm (đa ngữ); khớp search_meta.pkl
      DISABLE_RERANKER: "1"             # bỏ cross-encoder (~1.1GB) -> khởi động nhanh/nhẹ; search 2 tầng vẫn tốt
      # LLM cho chatbot (tùy chọn) — bỏ trống thì chạy tổng hợp cục bộ offline:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Ollama (LLM local MIỄN PHÍ) -> chatbot trò chuyện tự nhiên trong IT. Recommender trong
      # Docker gọi Ollama chạy trên máy HOST qua host.docker.internal.
      USE_OLLAMA: "1"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    volumes:
      - ./var/artifacts:/app/artifacts:ro  # model artifacts (~550MB) — không bake vào image
      - ./var/data:/app/data:ro            # catalog/CSV (recommender chỉ đọc khi cần)
      - hf-cache:/root/.cache/huggingface  # cache model -> không tải lại sau restart
    expose:
      - "8000"
    # Mở cổng recommender ra host để web LOCAL (npm run dev) gọi qua localhost:8000.
    ports:
      - "8000:8000"

  web:
    build:
      context: ./web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      recommender:
        condition: service_healthy   # CHỜ recommender nạp model xong -> web không bao giờ báo "không kết nối :8000"
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-it_learning}
      RECOMMENDER_URL: http://recommender:8000
      JWT_SECRET: ${JWT_SECRET:-doi-thanh-chuoi-bi-mat-that-dai}
      ITEMS_CSV: /data/it_learning_items_real_vi.csv   # DỮ LIỆU THẬT (đã dịch tiếng Việt): seed 4.088 khóa, khớp recommender
      ADMIN_PASSCODE: ${ADMIN_PASSCODE:-1}  # passcode vào trang /admin
      # Email quên mật khẩu (tùy chọn): App Password Gmail
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Bật khi chạy sau HTTPS/reverse-proxy (cookie secure). Để trống nếu chạy HTTP thuần:
      # NODE_ENV: production
    volumes:
      - ./var/data:/data                   # CSV: seed 4.088 khóa THẬT + GHI cộng dồn file upload (cần quyền ghi)
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  pgdata:
  hf-cache:
